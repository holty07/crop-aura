name: Build Mod

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: crop-aura-mod
          path: build/libs/*.jar
          if-no-files-found: error

  build-1-16-5:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      # Works around a known, unresolved ForgeGradle 4 bug (MinecraftForge/ForgeGradle#740):
      # FG4 throws NoSuchFileException generating mapping .tsrg files for MC 1.16.5 because it
      # never creates the parent directory itself. FG3 (older, on Gradle <6.0) generates those
      # same files correctly; once they exist in the shared Gradle cache, FG4 finds them and
      # works. This step just forces that generation before the real build runs.
      - name: Prime ForgeGradle mapping cache with ForgeGradle 3
        working-directory: forge-1.16.5-priming
        run: ./gradlew dependencies --configuration compileClasspath

      - name: Build with Gradle
        working-directory: forge-1.16.5
        run: ./gradlew build

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: crop-aura-mod-1.16.5
          path: forge-1.16.5/build/libs/*.jar
          if-no-files-found: error
