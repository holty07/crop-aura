name: Build Mod

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: crop-aura-mod
          path: build/libs/*.jar
          if-no-files-found: error

  build-1-16-5:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        working-directory: forge-1.16.5
        # ForgeGradle can fail on a fully cold cache with a NoSuchFileException while
        # generating official mappings (a parent dir isn't created yet); retry once,
        # since the partially-populated local cache from the first attempt fixes it.
        run: ./gradlew build || ./gradlew build

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: crop-aura-mod-1.16.5
          path: forge-1.16.5/build/libs/*.jar
          if-no-files-found: error
